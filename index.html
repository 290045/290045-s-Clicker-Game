<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>290045's Blackhole Clicker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Animated space background container -->
    <div class="space-bg"></div>

    <!-- Settings Trigger Button Top Left -->
    <button id="settings-toggle-btn" class="settings-toggle">⚙️ Settings</button>

    <!-- Shop Trigger Button Top Right -->
    <button id="shop-toggle-btn" class="shop-toggle">🌌 Open Shop</button>

    <!-- Slide-out Settings Menu Container -->
    <div id="settings-menu" class="settings-menu">
        <button id="settings-close-btn" class="settings-close">✕ Close</button>
        <h2>System Settings</h2>
        
        <div class="settings-section">
            <h3>Game Controls</h3>
            <button id="hard-reset-btn" class="reset-btn">
                ☢️ Collapse Reality (Hard Reset)
            </button>
            <p class="settings-warn">Warning: This will permanently delete your Dark Matter and all purchased upgrades!</p>
        </div>
    </div>

    <!-- Slide-out Shop Menu Container -->
    <div id="shop-menu" class="shop-menu">
        <button id="shop-close-btn" class="shop-close">✕ Close</button>
        <h2>Cosmic Shop</h2>
        
        <div class="shop-section">
            <h3>Manual Upgrades</h3>
            <button id="buy-click-up" class="shop-btn" disabled>
                Quantum Tap (+1/click)<br><span class="cost">Cost: 15</span>
            </button>
        </div>

        <div class="shop-section">
            <h3>Automated Upgrades</h3>
            <button id="buy-auto-up" class="shop-btn" disabled>
                Mini Singularity (+1/sec)<br><span class="cost">Cost: 50</span>
            </button>
        </div>
    </div>

    <!-- Master Screen Center Anchor Wrapper -->
    <div class="screen-center-wrapper">
        <div class="game-container">
            <div class="counter-box">
                <span class="label">DARK MATTER</span>
                <h1 id="score">0</h1>
                <span id="pps-display" class="sub-label">0 per second</span>
            </div>
            
            <!-- Black hole clicker image wrapper -->
            <div id="click-btn-container">
                <img id="click-btn" src="Black_Hole_Full.png" alt="Black Hole Clicker">
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
